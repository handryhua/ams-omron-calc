const fmt = new Intl.NumberFormat('id-ID');
const formatNumber = (val) => fmt.format(val);
const formatRupiah = (val) => `Rp ${fmt.format(val)}`;
const escapeHtml = (str) => String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);

allProducts.forEach(p => { qtyPkg[p.sku]=0; qtyGrd[p.sku]=0; bonusManualGrading[p.sku]=0; });

function getQty(sku) { return currentMode === "PACKAGE" ? (qtyPkg[sku]||0) : (qtyGrd[sku]||0); }
function setQty(sku, val) {
  val = Math.max(0, val);
  if (currentMode === "PACKAGE") qtyPkg[sku] = val;
  else { qtyGrd[sku] = val; const maxBonus = getGradingMaxBonus(sku, val); if (bonusManualGrading[sku] > maxBonus) bonusManualGrading[sku] = maxBonus; }
}
function getPackageDiscount(sku, subtotal) { return (currentMode === "PACKAGE" && subtotal >= 850000 && packageDisc[sku]) ? packageDisc[sku] : 0; }
function getGradingMaxBonus(sku, qty) { const r = gradingRules[sku]; if (!r || r.free === undefined || qty < r.min) return 0; return r.free + Math.floor((qty - r.min) / r.step); }
function getGradingBonus(sku) { if (currentMode !== "GRADING") return 0; const maxB = getGradingMaxBonus(sku, getQty(sku)); return Math.min(bonusManualGrading[sku] || 0, maxB); }
function setGradingBonus(sku, val) { const maxB = getGradingMaxBonus(sku, getQty(sku)); bonusManualGrading[sku] = Math.min(Math.max(0, val), maxB); }
function getPackageBonus() { if (currentMode !== "PACKAGE") return 0; const maxBonus = Math.floor(computeTotals().subtotal / 850000); return Math.min(packageBonusManual, maxBonus); }
function setPackageBonus(val) { const maxB = Math.floor(computeTotals().subtotal / 850000); packageBonusManual = Math.min(Math.max(0, val), maxB); }
function getDiscountPercent(sku, qty, subtotal) {
  if (currentMode === "PACKAGE") return getPackageDiscount(sku, subtotal);
  const rule = gradingRules[sku]; if (!rule) return 0;
  return (qty < rule.min) ? (rule.dist||0) : ((rule.omron||0)+(rule.dist||0));
}
function computeTotals() {
  let subtotalRaw = 0;
  for (let p of allProducts) subtotalRaw += p.price * getQty(p.sku);
  let totalDisc = 0;
  for (let p of allProducts) {
    let q = getQty(p.sku);
    let discPct = getDiscountPercent(p.sku, q, subtotalRaw);
    totalDisc += p.price * q * (discPct / 100);
  }
  let afterDisc = subtotalRaw - totalDisc;
  let ppn = afterDisc * 0.11;
  let grand = afterDisc + ppn;
  return { subtotal: subtotalRaw, totalDisc, afterDisc, ppn, grand, packageMaxBonus: Math.floor(subtotalRaw / 850000) };
}

function renderPriceCell(prod, qty, discPercent, bonusQty) {
  if (qty === 0) return `<div class="col-price"><div class="price-main">${formatNumber(prod.price)}</div><div class="price-note">HNA</div></div>`;
  const effectiveQty = qty + bonusQty;
  const finalAfterDisc = prod.price * (1 - discPercent/100);
  const finalWithPPN = finalAfterDisc * 1.11;
  const totalLine = finalWithPPN * qty;
  const finalPerUnit = totalLine / (effectiveQty || 1);
  let strike = discPercent > 0 ? `<div class="price-striked">${formatNumber(prod.price*1.11)}</div>` : '';
  let discBadge = discPercent > 0 ? `<div class="disc-badge">Disc ${discPercent}%</div>` : '';
  return `<div class="col-price"><div class="price-main">${formatNumber(finalPerUnit)}</div>${strike}${discBadge}<div class="price-note">Final (PPN11%)</div></div>`;
}

function getDisplayProducts() {
  let source = currentMode === "PACKAGE" ? allProducts.filter(p => packageSkuSet.has(p.sku)) : [...allProducts];
  let filtered = source.filter(p => p.omronName.toLowerCase().includes(searchText) || p.sku.toLowerCase().includes(searchText) || p.category.toLowerCase().includes(searchText));
  if (currentMode === "GRADING") {
    return filtered.sort((a,b) => {
      let qa = getQty(a.sku);
      let qb = getQty(b.sku);
      if (qb !== qa) return qb - qa;
      if (a.category !== b.category) return a.category.localeCompare(b.category);
      return a.omronName.localeCompare(b.omronName);
    });
  } else {
    const totals = computeTotals();
    return filtered.sort((a,b) => {
      let ba = (a.sku === "E245" && totals.packageMaxBonus > 0) ? 1 : 0;
      let bb = (b.sku === "E245" && totals.packageMaxBonus > 0) ? 1 : 0;
      if (bb !== ba) return bb - ba;
      let qa = getQty(a.sku), qb = getQty(b.sku);
      if (qb !== qa) return qb - qa;
      return a.omronName.localeCompare(b.omronName);
    });
  }
}

  document.querySelectorAll('.grading-input').forEach(inp => { inp.onchange = (e) => { let sku = e.currentTarget.dataset.sku, val = parseInt(e.currentTarget.value); setGradingBonus(sku, val); resetSearchAndRender(); }; });

function generateCopyText() {
  let customer = custInput.value.trim() || "-";
  let totals = computeTotals();
  let text = `Mohon diajukan\n${customer}\n─────────────────\n`;
  for (let p of allProducts) {
    let qty = getQty(p.sku); if (qty === 0) continue;
    let bonus = 0;
    if (currentMode === "GRADING") bonus = getGradingBonus(p.sku);
    else if (p.sku === "E245") bonus = getPackageBonus();
    let discOmron = 0, discDist = 0;
    if (currentMode === "GRADING") {
      let rule = gradingRules[p.sku];
      if (rule && qty >= rule.min) { discOmron = rule.omron || 0; discDist = rule.dist || 0; }
      else if (rule) discDist = rule.dist || 0;
    } else {
      discOmron = getPackageDiscount(p.sku, totals.subtotal);
    }
    text += `${p.omronName} (${p.sku})\n${qty} unit${bonus>0 ? ` + Bonus ${bonus}` : ""}\n`;
    if (currentMode === "PACKAGE") text += `Disc HO ${discOmron}%\n`;
    else text += `Disc Omron ${discOmron}% + Disc Dist ${discDist}%\n`;
    text += `\n`;
  }
  if (currentMode === "PACKAGE") {
    let pkgBonus = getPackageBonus();
    if (pkgBonus > 0) text += `🎁 Bonus MC246: ${pkgBonus} unit\n`;
    if (voucherActive) text += `Ref. Bonus Voucher Nusantara\n`;
  }
  text += `Total HNA: ${formatRupiah(totals.subtotal)}\nTotal Faktur: ${formatRupiah(totals.grand)}`;
  return text;
}

      <td style="text-align:right; border-top:2px solid #000;"><b>${formatRupiah(totals.subtotal)}</b></td>
    </tr>
  </table>
  <table class="footer-table">
    <tr><td>SHARE DISCOUNT AMS</td><td style="text-align:right">___________</td></tr>
    <tr><td>SHARE DISCOUNT PRINCIPAL</td><td style="text-align:right">___________</td></tr>
    <tr><td>SHARE DISCOUNT AMS HO</td><td style="text-align:right">___________</td></tr>
    <tr><td>TOTAL DISCOUNT</td><td style="text-align:right">___________</td></tr>
    <tr><td>LAIN-LAIN (BONUS)</td><td style="text-align:right">${(currentMode==="PACKAGE"?getPackageBonus():'')}</td></tr>
    <tr><td><b>TOTAL</b></td><td style="text-align:right"><b>${formatRupiah(totals.subtotal)}</b></td></tr>
  </table>
  <div class="sign">
    <div>Yang Mengajukan,<br><br><br><br><br><br><br><br><br><br>AMS KACAB &nbsp;&nbsp;&nbsp; PRINCIPAL</div>
    <div>Menyetujui,<br><br><br><br><br><br><br><br><br><br>AMS HO &nbsp;&nbsp;&nbsp; PRINCIPAL HO</div>
  </div>
  </body></html>`);
  win.document.close(); win.print();
};

cartBtn.onclick = (e) => { e.stopPropagation(); cartMenu.style.display = cartMenu.style.display==='flex'?'none':'flex'; };

renderList();
</script>
